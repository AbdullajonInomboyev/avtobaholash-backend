services:
  - type: web
    name: avtobaholash-backend
    runtime: python
    buildCommand: pip install -r requirements/production.txt && python manage.py collectstatic --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://avtobaholash-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: avtobaholash-db
          property: connectionString
      - key: REDIS_URL
        value: "memory://"
      - key: AI_PROVIDER
        value: "anthropic"
      - key: ANTHROPIC_API_KEY
        value: ""
    buildFilter:
      paths:
        - "**"

databases:
  - name: avtobaholash-db
    databaseName: avtobaholash
    user: avtobaholash